# Correct colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
#set -as terminal-features ",alacritty:RGB"
#set-option -ga terminal-overrides ",xterm-256color:Tc"

# Splitting panes 
unbind %
unbind '"'
bind C command-prompt -p "New window name:" "new-window -n '%%' -c '#{pane_current_path}'"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Basic
set -g history-limit 500000
set -g mode-keys vi

# Monitoring / notifications
# Persistent window-name styling for activity/silence/bell (styles set after plugin load below)
setw -g monitor-activity on
setw -g monitor-silence 30
setw -g monitor-bell on
set -g bell-action any
# Explicitly disable status-line popups — source-file does not reset previously-set options,
# so without this they'd remain on from any prior reload that turned them on.
set -g visual-activity off
set -g visual-silence off
set -g visual-bell off

# Resize
bind -r j resize-pane -D 2
bind -r k resize-pane -U 2
bind -r l resize-pane -R 2
bind -r h resize-pane -L 2
bind -r m resize-pane -Z

# Mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Create windows after currently focused window
bind c new-window -a -c "#{pane_current_path}"

# Create sessions
bind N command-prompt -p "New session name:" "new-session -s '%%'"

# Clear screen
bind C-l send-keys 'C-l'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator' # Ctrl-hjkl
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-sidebar'

set -g @continuum-restore 'on'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"
# Show activity/bell/silence icons in window status (uses nerd-font glyphs)
set -g @catppuccin_window_flags "icon"
# Show at most one icon, with priority bell > activity > silence.
# Nested conditionals: if bell, else if activity, else if silence, else nothing.
# Uses ##{ to defer the outer conditionals through catppuccin's E: double-expansion.
set -g @catppuccin_window_flags_icon_format "##{?window_bell_flag,#{E:@catppuccin_window_flags_icon_bell},##{?window_activity_flag,#{E:@catppuccin_window_flags_icon_activity},##{?window_silence_flag,#{E:@catppuccin_window_flags_icon_silent},}}}"
# Highlight activity/bell icons via colored fg + bold. Alacritty does not implement the SGR
# blink attribute, so we omit #[blink] and rely on color contrast.
# Each #[...] block holds ONE attribute — multi-attr #[a,b,c] would inject commas into
# the icon string and break catppuccin's `#{?flag,<icon>,}` conditional (`,` is the branch
# delimiter). Trailing blocks restore catppuccin's default fg / unbold.
set -g @catppuccin_window_flags_icon_activity " #[fg=#{@thm_red}]#[bold]󱅫#[fg=#{@thm_fg}]#[nobold]"
set -g @catppuccin_window_flags_icon_bell     "  #[fg=#{@thm_yellow}]#[bold]#[fg=#{@thm_fg}]#[nobold]  "

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 200
set -g status-left ""
set -ag status-left " #{E:@catppuccin_status_session}#[fg=#{@_ctp_status_bg},reverse]#[none]#[default] "
set -ag status-left '#{?window_zoomed_flag,🔍 ,}'
set -g status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}" # Somtimes corrupts buffer !
set -ag status-right "#{E:@catppuccin_status_uptime}" # Sometime corrupts buffer !
set -ag status-right "#{E:@catppuccin_status_date_time}" # Date and time

# Override catppuccin's window naming format
# Show only window name when explicitly named, otherwise show the running program
set -g @catppuccin_window_default_text "#{?automatic-rename, #{b:pane_current_command}, #W}"
set -g @catppuccin_window_current_text "#{?automatic-rename, #{b:pane_current_command}, #W}"
set -g @catppuccin_window_text "#{?automatic-rename, #{b:pane_current_command}, #W}"

# Install plugins
run '~/.tmux/plugins/tpm/tpm'

# Override vim-tmux-navigator after TPM loads so navigation stops at pane edges instead of wrapping around
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }
